# DSL effect functions — the single hand-maintained source for func metadata
# (label/unit/negate) and gear-stat routing (stat, or stats for duals). Argless
# presentation directives carry curveFields (value read from the EnchantLevel).
# Seeded once from scripts/effect_labels.json + func_stat_keys.json (kept on
# disk) via cmd/seedeffectfuncs; edit here going forward.
package: model
type: EffectFuncStat
underlying: string
marshalText: false
case: snake
out: ..
# Route gear-stat fields to the StatId enum; the generator validates every name
# against stats.yml and emits StatId constants. curveFields stays []string — it
# names EnchantLevel curve columns (durability, addedEvasion, …), not StatIds.
fields:
  stat: StatId
  stats: "[]StatId"
  # Fixed client values and bundled derived effects (was effectFuncRules in
  # dsl.go). derived is a slice of the package's EffectDsl struct — resolved and
  # rendered against its real fields by cmd/enum_codegen.
  fixedValue: float64
  derived: "[]EffectDsl"
